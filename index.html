<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sanz For Taaa✨</title>
    
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;400;600;800&family=Space+Grotesk:wght@700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #fdf2f8; 
            width: 100vw; height: 100vh;
            overflow: hidden;
            display: flex; align-items: center; justify-content: center;
            perspective: 2000px;
        }

        /* LIQUID BACKGROUND */
        .liquid-bg-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #fce7f3 0%, #f3e8ff 100%);
            z-index: -5;
        }

        .blob {
            position: absolute;
            filter: blur(90px); opacity: 0.8; z-index: -4;
            animation: organicFlow 25s infinite alternate cubic-bezier(0.4, 0, 0.2, 1);
        }

        .blob-1 {
            width: 80vw; height: 80vw; top: -10%; left: -10%;
            background: linear-gradient(45deg, #f472b6, #d8b4fe);
            border-radius: 43% 57% 70% 30% / 40% 30% 70% 60%;
        }

        .blob-2 {
            width: 90vw; height: 90vw; bottom: -20%; right: -10%;
            animation-delay: -5s;
            background: linear-gradient(45deg, #c084fc, #fbcfe8);
            border-radius: 70% 30% 30% 70% / 60% 70% 30% 40%;
        }

        @keyframes organicFlow {
            0% { transform: translate(0, 0) rotate(0deg) scale(1); }
            50% { transform: translate(5%, 10%) rotate(10deg) scale(1.05); }
            100% { transform: translate(-5%, -5%) rotate(-10deg) scale(0.95); }
        }

        #particleCanvas {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -3; pointer-events: none;
        }

        /* MASTER CONTAINER */
        .container-master {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 100%; max-width: 480px; padding: 20px;
            z-index: 10; transform-style: preserve-3d;
        }

        /* GLASSMORPHISM */
        .glass-panel {
            width: 100%;
            background: rgba(255, 255, 255, 0.25); 
            backdrop-filter: blur(40px) saturate(180%); 
            -webkit-backdrop-filter: blur(40px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.6); 
            border-radius: 40px;
            box-shadow: 0 30px 60px -10px rgba(147, 51, 234, 0.15), inset 0 0 20px rgba(255, 255, 255, 0.5); 
            padding: 45px 25px;
            text-align: center;
            position: absolute; 
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: #1e1b4b; 
            overflow: hidden;
        }

        .glass-glare {
            position: absolute; top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: linear-gradient(105deg, transparent 20%, rgba(255,255,255,0.4) 25%, transparent 30%);
            transform: translateX(-100%);
            z-index: 0; pointer-events: none;
            transition: transform 0.1s ease-out;
        }

        .panel-content { position: relative; z-index: 2; }

        #page-1 { display: block; }
        #page-2 { display: none; opacity: 0; padding: 50px 35px; }

        .header-title {
            font-size: 11px; font-weight: 800; text-transform: uppercase;
            letter-spacing: 6px; color: rgba(147, 51, 234, 0.7);
            margin-bottom: 25px;
        }

        .lock-box {
            width: 90px; height: 90px; margin: 0 auto 25px auto;
            background: rgba(255, 255, 255, 0.4); border-radius: 25px;
            display: flex; align-items: center; justify-content: center;
            font-size: 40px; border: 1px solid rgba(255, 255, 255, 0.7);
            box-shadow: 0 10px 30px rgba(219, 39, 119, 0.2);
            animation: bounce 3s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .lock-glitch { animation: glitch 0.2s steps(2) infinite !important; }
        @keyframes glitch {
            0% { transform: translate(2px, -2px); filter: hue-rotate(90deg); }
            50% { transform: translate(-2px, 2px); filter: hue-rotate(-90deg); }
            100% { transform: translate(0); filter: hue-rotate(0); }
        }

        /* 5-COLUMN TIMER LAYOUT */
        .timer-container {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 35px;
        }

        .time-block {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .time-text {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 38px; font-weight: 700; color: #be185d;
            letter-spacing: -1px; line-height: 1;
            text-shadow: 0 4px 10px rgba(190, 24, 93, 0.2);
        }

        .time-label {
            font-size: 8px; font-weight: 800; color: #7e22ce;
            text-transform: uppercase; letter-spacing: 2px; margin-top: 5px;
        }

        /* HOLD TO UNLOCK BUTTON */
        .hold-btn-container {
            display: none; position: relative; width: 100%; height: 55px;
            background: rgba(255, 255, 255, 0.5); border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.8);
            overflow: hidden; cursor: pointer;
            box-shadow: 0 10px 25px rgba(219, 39, 119, 0.15);
        }

        .hold-btn-fill {
            position: absolute; top: 0; left: 0; height: 100%; width: 0%;
            background: linear-gradient(90deg, #f472b6, #c084fc);
            transition: width 0.1s linear; z-index: 1;
        }

        .hold-btn-text {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            font-size: 11px; font-weight: 800; color: #831843;
            text-transform: uppercase; letter-spacing: 2px; z-index: 2;
            transition: color 0.3s; pointer-events: none;
        }

        /* TEXT HALAMAN 2 */
        .text-gradient {
            font-family: 'Space Grotesk', sans-serif; 
            background: linear-gradient(135deg, #be185d, #7e22ce);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            font-size: 32px; font-weight: 700;
            margin-bottom: 20px;
        }

        .divider {
            width: 40px; height: 3px; background: #f472b6;
            margin: 0 auto 25px auto; border-radius: 2px;
        }

        .message-text {
            color: #4c1d95; font-size: 14px; font-weight: 500;
            line-height: 1.8; margin-bottom: 20px; text-align: left;
        }
        
        .message-text span::after {
            content: '|'; color: #db2777; animation: blink 0.8s infinite;
        }
        @keyframes blink { 50% { opacity: 0; } }

        /* TRANSISI */
        .zoom-out-smooth { animation: zoomOutSmooth 0.8s forwards cubic-bezier(0.16, 1, 0.3, 1); }
        .slide-up-smooth { animation: slideUpSmooth 1s forwards cubic-bezier(0.16, 1, 0.3, 1); }

        @keyframes zoomOutSmooth {
            to { opacity: 0; transform: translate(-50%, -50%) scale(0.85); filter: blur(10px); }
        }
        @keyframes slideUpSmooth {
            from { opacity: 0; transform: translate(-50%, 0); filter: blur(10px); }
            to { opacity: 1; transform: translate(-50%, -50%); filter: blur(0); }
        }
    </style>
</head>
<body>

    <audio id="bg-music" src="https://files.catbox.moe/81qlp8.mp3" loop preload="auto"></audio>

    <div class="liquid-bg-container"></div>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <canvas id="particleCanvas"></canvas>

    <div class="container-master" id="tilt-container">
        <div id="page-1" class="glass-panel">
            <div class="glass-glare" id="glare-1"></div>
            <div class="panel-content">
                <div class="header-title">Secured Vault</div>
                <div class="lock-box" id="lock-visual">
                    <span id="lock-icon">🔒</span>
                </div>
                
                <div id="timer-ui" class="timer-container">
                    <div class="time-block">
                        <div class="time-text" id="mo-display">00</div>
                        <div class="time-label">Bln</div>
                    </div>
                    <div class="time-block">
                        <div class="time-text" id="d-display">00</div>
                        <div class="time-label">Hr</div>
                    </div>
                    <div class="time-block">
                        <div class="time-text" id="h-display">00</div>
                        <div class="time-label">Jam</div>
                    </div>
                    <div class="time-block">
                        <div class="time-text" id="m-display">00</div>
                        <div class="time-label">Mnt</div>
                    </div>
                    <div class="time-block">
                        <div class="time-text" id="s-display">00</div>
                        <div class="time-label">Dtk</div>
                    </div>
                </div>

                <div class="hold-btn-container" id="hold-btn">
                    <div class="hold-btn-fill" id="btn-fill"></div>
                    <div class="hold-btn-text" id="btn-text">Tahan Untuk Buka</div>
                </div>
            </div>
        </div>

        <div id="page-2" class="glass-panel">
            <div class="glass-glare" id="glare-2"></div>
            <div class="panel-content">
                <h2 class="text-gradient">Halo Sayang... ✨</h2>
                <div class="divider"></div>
                <p class="message-text"><span></span></p>
                <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 35px;">
                    <span style="font-size: 10px; font-weight: 800; color: #a855f7; text-transform: uppercase; letter-spacing: 4px;">Sanz</span>
                    <span style="font-size: 24px; filter: drop-shadow(0 2px 5px rgba(219,39,119,0.4));">💖</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');
        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;
        window.addEventListener('resize', () => { width = canvas.width = window.innerWidth; height = canvas.height = window.innerHeight; });

        class Particle {
            constructor() {
                this.x = Math.random() * width; this.y = Math.random() * height;
                this.size = Math.random() * 2 + 1;
                this.color = Math.random() > 0.5 ? 'rgba(244, 114, 182, 0.5)' : 'rgba(192, 132, 252, 0.5)';
                this.speedY = Math.random() * -0.5 - 0.1;
                this.speedX = (Math.random() - 0.5) * 0.5;
            }
            update() {
                this.y += this.speedY; this.x += this.speedX;
                if (this.y < 0) { this.y = height; this.x = Math.random() * width; }
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.color; ctx.fill();
            }
        }
        let particles = Array.from({length: 40}, () => new Particle());
        function animate() { ctx.clearRect(0, 0, width, height); particles.forEach(p => p.update()); requestAnimationFrame(animate); }
        animate();

        const panels = document.querySelectorAll('.glass-panel');
        const glares = document.querySelectorAll('.glass-glare');
        window.addEventListener('mousemove', (e) => {
            const x = window.innerWidth / 2 - e.pageX; const y = window.innerHeight / 2 - e.pageY;
            panels.forEach(panel => { panel.style.transform = `translate(-50%, -50%) rotateY(${x/40}deg) rotateX(${y/40}deg)`; });
            const glarePos = (e.pageX / window.innerWidth) * 200 - 100;
            glares.forEach(glare => { glare.style.transform = `translateX(${glarePos}%) rotate(15deg)`; });
        });

        // TANGGAL TARGET (Gue set ke tahun 2027 biar lo liat angka bulannya jalan!)
        let targetDate = new Date("April 10, 2026 00:00:00").getTime();
        
        const timer = setInterval(() => {
            const dist = targetDate - new Date().getTime();
            if (dist <= 0) {
                clearInterval(timer);
                document.getElementById('timer-ui').style.display = 'none';
                document.getElementById('lock-icon').innerText = "✨";
                document.getElementById('lock-visual').classList.add('lock-glitch');
                document.getElementById('hold-btn').style.display = 'block';
                return;
            }
            
            // LOGIC BARU BUAT NGITUNG BULAN (Rata-rata 1 bulan = 30.44 hari)
            const daysInMonth = 30.436875;
            const totalDays = dist / (1000 * 60 * 60 * 24);
            
            const mo = Math.floor(totalDays / daysInMonth);
            const d = Math.floor(totalDays % daysInMonth);
            const h = Math.floor((dist % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((dist % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((dist % (1000 * 60)) / 1000);
            
            document.getElementById('mo-display').innerText = String(mo).padStart(2,'0');
            document.getElementById('d-display').innerText = String(d).padStart(2,'0');
            document.getElementById('h-display').innerText = String(h).padStart(2,'0');
            document.getElementById('m-display').innerText = String(m).padStart(2,'0');
            document.getElementById('s-display').innerText = String(s).padStart(2,'0');
        }, 1000);

        const holdBtn = document.getElementById('hold-btn');
        const fillBar = document.getElementById('btn-fill');
        const btnText = document.getElementById('btn-text');
        const bgMusic = document.getElementById('bg-music');
        let holdTimer; let progress = 0;

        const startHold = (e) => {
            e.preventDefault();
            bgMusic.load(); 
            holdTimer = setInterval(() => {
                progress += 2;
                fillBar.style.width = progress + '%';
                if (progress >= 100) { clearInterval(holdTimer); executeUnlock(); }
            }, 20);
        };

        const stopHold = () => { clearInterval(holdTimer); progress = 0; fillBar.style.width = '0%'; };

        holdBtn.addEventListener('mousedown', startHold);
        holdBtn.addEventListener('mouseup', stopHold);
        holdBtn.addEventListener('mouseleave', stopHold);
        holdBtn.addEventListener('touchstart', startHold);
        holdBtn.addEventListener('touchend', stopHold);

        const pesan = [
            "Happy Anniversary! ❤️",
            "Maafin aku ya kalau selama ini aku sering buat kamu marah, ngambek, ga enakan dll. Aku itu cuma mwu buat kamu yang terbaik sama aku.",
            "Lewat capsule temporal ini, aku mau kamu tau kalau kamu tetep jadi prioritas paling utama di hidupku, walaupun bukan apa-apa. I love you. 🌷"
        ];

        function typeWriter(el, text, speed) {
            let i = 0; el.innerHTML = ""; 
            function type() {
                if (i < text.length) { el.innerHTML += text.charAt(i); i++; setTimeout(type, speed); }
            }
            type();
        }

        function executeUnlock() {
            bgMusic.play().catch(e => console.log("Gagal muter lagu!", e));
            confetti({ particleCount: 150, spread: 100, origin: { y: 0.6 }, colors: ['#f472b6', '#c084fc', '#ffffff'] });
            
            const p1 = document.getElementById('page-1');
            const p2 = document.getElementById('page-2');
            
            p1.classList.add('zoom-out-smooth');
            setTimeout(() => {
                p1.style.display = 'none'; p2.style.display = 'block'; p2.classList.add('slide-up-smooth'); 
                setTimeout(() => { typeWriter(document.querySelector('#page-2 .message-text span'), pesan.join("\n\n"), 40); }, 500); 
            }, 700); 
        }
    </script>
</body>
</html>
